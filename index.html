<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Việt Hoá JSON Subnautica - Phiên Bản Pro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Bảng điều khiển */
        .dashboard { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        input[type="file"] { border: 1px solid #ccc; padding: 8px; border-radius: 5px; background: white; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: all 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-blue { background-color: var(--secondary); }
        .btn-blue:hover:not(:disabled) { background-color: #2980b9; }
        .btn-green { background-color: var(--success); }
        .btn-green:hover:not(:disabled) { background-color: #27ae60; }
        .btn-red { background-color: var(--danger); }
        
        /* Trạng thái và Tiến trình */
        .status-box { flex-basis: 100%; margin-top: 10px; font-size: 15px; font-weight: bold; }
        .progress-wrapper { width: 100%; background: #e0e0e0; border-radius: 20px; overflow: hidden; height: 25px; margin-top: 15px; display: none; position: relative; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); width: 0%; transition: width 0.4s ease; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #000; font-size: 12px; font-weight: bold; }

        /* Bảng dữ liệu */
        .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; vertical-align: top; word-wrap: break-word; }
        th { background-color: var(--primary); color: white; position: sticky; top: 0; }
        th:nth-child(1) { width: 20%; } /* Key */
        th:nth-child(2) { width: 40%; } /* English */
        th:nth-child(3) { width: 40%; } /* Vietnamese */
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e8f4f8; }
        .translated { color: #27ae60; font-weight: bold; }

        /* Phân trang */
        .pagination { display: flex; gap: 10px; align-items: center; }
        .pagination button { padding: 5px 10px; background: var(--primary); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Công Cụ Việt Hoá File JSON (Subnautica Pro)</h1>
    
    <div class="dashboard">
        <input type="file" id="fileInput" accept=".json">
        <button id="translateBtn" class="btn-blue" disabled>⚡ Bắt Đầu Dịch Tự Động</button>
        <button id="pauseBtn" class="btn-red" style="display:none;">Tạm Dừng</button>
        <button id="downloadBtn" class="btn-green" style="display:none;">⬇️ Tải File Đã Dịch</button>
        
        <div class="status-box" id="statusMessage">Chờ tải file... (Hỗ trợ file JSON game chứa comment và lỗi dòng)</div>
        
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <div class="table-controls">
        <div id="tableInfo">Hiển thị: 0 dòng</div>
        <div class="pagination">
            <button id="prevPage" disabled>◄ Trang Trước</button>
            <span id="pageInfo">Trang 0 / 0</span>
            <button id="nextPage" disabled>Trang Sau ►</button>
        </div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Key (Mã Game)</th>
                <th>Tiếng Anh (Gốc)</th>
                <th>Tiếng Việt (Bản Dịch)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="3" style="text-align:center;">Vui lòng chọn file JSON để bắt đầu...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // --- BIẾN TOÀN CỤC ---
    let originalData = {};
    let translatedData = {};
    let dataKeys = [];
    let isTranslating = false;
    
    // Cài đặt phân trang
    let currentPage = 1;
    const itemsPerPage = 50;

    // Các Element UI
    const fileInput = document.getElementById('fileInput');
    const translateBtn = document.getElementById('translateBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusMessage = document.getElementById('statusMessage');
    const tableBody = document.getElementById('tableBody');
    const progressWrapper = document.getElementById('progressWrapper');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');
    const tableInfo = document.getElementById('tableInfo');

    // ==========================================
    // 1. BỘ XỬ LÝ JSON ĐẶC BIỆT CHO GAME
    // Giải quyết triệt để lỗi xuống dòng và comment
    // ==========================================
    function sanitizeGameJSON(rawText) {
        let text = rawText.replace(/^\uFEFF/, ''); // Xoá BOM
        
        let result = '';
        let inString = false;
        let escapeNext = false;

        // Quét từng ký tự để xử lý lỗi xuống dòng (Enter) bên trong chuỗi string
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (escapeNext) { result += char; escapeNext = false; continue; }
            if (char === '\\') { escapeNext = true; result += char; continue; }
            if (char === '"') { inString = !inString; result += char; continue; }

            if (inString) {
                if (char === '\n') result += '\\n'; // Chuyển Enter thực thành \n
                else if (char === '\r') result += '';
                else if (char === '\t') result += '\\t';
                else result += char;
            } else {
                result += char;
            }
        }

        // Xoá comment // và /* */
        result = result.replace(/\/\*[\s\S]*?\*\//g, '');
        result = result.replace(/([^\\]|^)\/\/.*$/gm, '$1');
        
        // Xoá dấu phẩy thừa ở dòng cuối (Trailing comma)
        result = result.replace(/,(?=\s*[}\]])/g, '');

        return result;
    }

    // ==========================================
    // 2. XỬ LÝ SỰ KIỆN TẢI FILE LÊN
    // ==========================================
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const safeJSONString = sanitizeGameJSON(evt.target.result);
                originalData = JSON.parse(safeJSONString);
                translatedData = JSON.parse(JSON.stringify(originalData)); // Copy dữ liệu
                dataKeys = Object.keys(originalData);
                
                statusMessage.innerHTML = `<span style="color:var(--success)">✔️ Đã tải thành công file! Tìm thấy ${dataKeys.length} đoạn hội thoại/từ vựng.</span>`;
                translateBtn.disabled = false;
                downloadBtn.style.display = 'inline-block';
                
                currentPage = 1;
                renderTable();
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = `<span style="color:var(--danger)">❌ Lỗi: Cấu trúc JSON vẫn chưa hợp lệ. File game bị hỏng quá nặng.</span>`;
            }
        };
        reader.readAsText(file);
    });

    // ==========================================
    // 3. HIỂN THỊ VÀ PHÂN TRANG BẢNG DỮ LIỆU
    // ==========================================
    function renderTable() {
        tableBody.innerHTML = '';
        const totalPages = Math.ceil(dataKeys.length / itemsPerPage);
        
        // Logic disable/enable nút chuyển trang
        prevPageBtn.disabled = currentPage === 1;
        nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;
        pageInfo.innerText = `Trang ${currentPage} / ${totalPages}`;
        tableInfo.innerText = `Tổng số dòng: ${dataKeys.length}`;

        // Lấy dữ liệu của trang hiện tại
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageKeys = dataKeys.slice(startIndex, endIndex);

        pageKeys.forEach(key => {
            const tr = document.createElement('tr');
            
            // Highlight nếu đã dịch xong (khác bản gốc)
            const isTranslated = originalData[key] !== translatedData[key] && translatedData[key] !== "";
            const transClass = isTranslated ? 'class="translated"' : '';

            tr.innerHTML = `
                <td><b>${key}</b></td>
                <td>${escapeHTML(originalData[key])}</td>
                <td id="cell-${key}" ${transClass}>${escapeHTML(translatedData[key])}</td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // Sự kiện chuyển trang
    prevPageBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); } });
    nextPageBtn.addEventListener('click', () => { if (currentPage < Math.ceil(dataKeys.length / itemsPerPage)) { currentPage++; renderTable(); } });

    // Tiện ích chống lỗi hiển thị HTML tag trong chuỗi
    function escapeHTML(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ==========================================
    // 4. BỘ BẢO VỆ MÃ CODE GAME (REGEX)
    // ==========================================
    function protectGameTags(text) {
        let protectedText = text;
        const map = {};
        let counter = 0;

        // Bảo vệ các thẻ <color=...>, <delay=...>, <duration=...>
        protectedText = protectedText.replace(/<[^>]+>/g, function(match) {
            const placeholder = `[__TAG${counter}__]`;
            map[placeholder] = match;
            counter++;
            return placeholder;
        });

        // Bảo vệ các biến số {0}, {1}
        protectedText = protectedText.replace(/\{\d+\}/g, function(match) {
            const placeholder = `[__VAR${counter}__]`;
            map[placeholder] = match;
            counter++;
            return placeholder;
        });

        // Bảo vệ ký tự \n
        protectedText = protectedText.replace(/\\n/g, function(match) {
            const placeholder = `[__NL${counter}__]`;
            map[placeholder] = match;
            counter++;
            return placeholder;
        });

        return { text: protectedText, map: map };
    }

    function restoreGameTags(text, map) {
        let restoredText = text;
        for (const [placeholder, originalVal] of Object.entries(map)) {
            // Đề phòng Google Dịch tự ý chèn dấu cách vào placeholder (ví dụ [ __ TAG0 __ ])
            const regexFriendlyPlaceholder = placeholder.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/_/g, '\\s*_\\s*');
            const regex = new RegExp(regexFriendlyPlaceholder, 'g');
            restoredText = restoredText.replace(regex, originalVal);
        }
        return restoredText;
    }

    // ==========================================
    // 5. GỌI API GOOGLE TRANSLATE
    // ==========================================
    async function translateTextWithGoogle(text) {
        if (!text || typeof text !== 'string' || text.trim() === '') return text;

        // 1. Bảo vệ các tag code của game
        const { text: safeText, map } = protectGameTags(text);

        // 2. Gọi Google Translate API (Public endpoint)
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(safeText)}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // Gộp các câu dịch lại (Google chia nhỏ câu nếu quá dài)
            let translated = data[0].map(item => item[0]).join('');
            
            // 3. Trả lại các tag code game vào đúng vị trí
            return restoreGameTags(translated, map);
        } catch (error) {
            console.error("Lỗi Google API:", error);
            return text; // Giữ nguyên gốc nếu lỗi
        }
    }

    // ==========================================
    // 6. VÒNG LẶP DỊCH TỰ ĐỘNG
    // ==========================================
    translateBtn.addEventListener('click', async function() {
        isTranslating = true;
        translateBtn.style.display = 'none';
        pauseBtn.style.display = 'inline-block';
        progressWrapper.style.display = 'block';
        
        let total = dataKeys.length;
        let processed = 0;

        for (let i = 0; i < total; i++) {
            if (!isTranslating) break; // Xử lý khi bấm nút Tạm Dừng

            const key = dataKeys[i];
            const originalText = originalData[key];

            // Chỉ dịch nếu chưa được dịch (hoặc là nội dung cũ)
            if (typeof originalText === 'string' && originalText.length > 0) {
                // Tạm bỏ qua nếu đã dịch rồi (để tiết kiệm API nếu resume)
                if (translatedData[key] === originalText) {
                    statusMessage.innerHTML = `Đang dịch dòng ${i + 1}/${total}: <b>${key}</b>`;
                    const result = await translateTextWithGoogle(originalText);
                    translatedData[key] = result;

                    // Cập nhật giao diện nếu dòng đó đang ở trang hiện tại
                    const cell = document.getElementById(`cell-${key}`);
                    if (cell) {
                        cell.innerText = result;
                        cell.classList.add('translated');
                    }

                    // Delay 0.6 giây để tránh bị Google chặn IP vì Spam request
                    await new Promise(r => setTimeout(r, 600)); 
                }
            }

            // Cập nhật thanh tiến trình
            processed++;
            const percent = Math.floor((processed / total) * 100);
            progressBar.style.width = percent + '%';
            progressText.innerText = percent + '% (' + processed + '/' + total + ')';
        }

        if (processed === total) {
            statusMessage.innerHTML = `<span style="color:var(--success)">🎉 Đã dịch xong toàn bộ file! Bấm Tải Xuống để nhận kết quả.</span>`;
            translateBtn.style.display = 'none';
            pauseBtn.style.display = 'none';
        }
    });

    pauseBtn.addEventListener('click', function() {
        isTranslating = false;
        translateBtn.style.display = 'inline-block';
        translateBtn.innerText = '▶️ Tiếp Tục Dịch';
        pauseBtn.style.display = 'none';
        statusMessage.innerHTML = `<span style="color:var(--danger)">⏸️ Đã tạm dừng.</span>`;
    });

    // ==========================================
    // 7. XUẤT VÀ TẢI FILE
    // ==========================================
    downloadBtn.addEventListener('click', function() {
        // Xuất file JSON với định dạng 4 dấu cách cho đẹp mắt
        const jsonString = JSON.stringify(translatedData, null, 4);
        const blob = new Blob([jsonString], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = "Vietnamese_Subnautica.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
