<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> cờ vua  </title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #ecf0f1;
            --text-color: #34495e;
            --shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 15px 0;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #board {
            width: 100%;
            border: 5px solid white;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            background-color: white;
            touch-action: none;
        }

        /* NÂNG CẤP CSS CHO CHỨC NĂNG ẤN */
        .square-55d63 {
            cursor: pointer; /* Đổi con trỏ khi trỏ vào ô cờ */
        }
        .highlight-move {
            box-shadow: inset 0 0 3px 3px rgba(39, 174, 96, 0.8);
        }
        .highlight-selected {
            background-color: rgba(241, 196, 15, 0.5) !important;
        }

        .panel {
            width: 100%;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #status {
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            padding: 8px;
            border-radius: 4px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        select, button {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        select {
            background-color: white;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
            padding-right: 30px;
            cursor: pointer;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { background-color: #219150; }
        button:active { transform: translateY(1px); }

        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            .panel { padding: 10px; gap: 8px; }
            select, button, #status { font-size: 14px; padding: 10px; }
            .main-container { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1> cờ vua </h1>
        
        <div id="board"></div>

        <div class="panel">
            <div id="status">Đang tải...</div>
            
            <div class="controls">
                <select id="gameMode">
                    <option value="pvp">Người vs Người</option>
                    <option value="pve">Người vs Máy (AI PRO)</option>
                </select>
                <button id="resetBtn">Chơi Mới</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
