<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cờ vua</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --bg-gradient-1: #0f2027;
            --bg-gradient-2: #203a43;
            --bg-gradient-3: #2c5364;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --text-main: #f8f9fa;
            --accent-green: #769656; /* Màu xanh lá chuẩn Chess.com */
            --accent-light: #eeeed2;
            --danger-red: #ff4757;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 20px 0;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Tùy chỉnh màu Bàn cờ giống Chess.com */
        #board {
            width: 100%;
            border: 8px solid #2f3640;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            overflow: hidden;
            touch-action: none;
        }
        .white-1e1d7 { background-color: var(--accent-light) !important; color: var(--accent-green) !important; }
        .black-3c85d { background-color: var(--accent-green) !important; color: var(--accent-light) !important; }

        /* Nâng cấp CSS Highlight (Tô màu khi chọn quân) */
        .highlight-move {
            box-shadow: inset 0 0 0 4px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        .highlight-move::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30%; height: 30%;
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
        }
        .highlight-selected {
            background-color: rgba(246, 229, 141, 0.8) !important;
        }

        /* Bảng điều khiển (Hiệu ứng kính - Glassmorphism) */
        .panel {
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #status {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.2);
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 400px) {
            .controls { flex-direction: row; }
        }

        select, button {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border: none;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        select {
            background-color: rgba(255, 255, 255, 0.9);
            color: #2f3640;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232f3640' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 1.2em;
            padding-right: 40px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button {
            background-color: #2ed573;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        button:hover { 
            background-color: #27ae60; 
            transform: translateY(-2px);
        }
        button:active { 
            transform: translateY(1px); 
            box-shadow: 0 2px 5px rgba(46, 213, 115, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .panel { padding: 15px; }
            select, button { font-size: 14px; padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>♕ cờ vua ♚</h1>
        
        <div id="board"></div>

        <div class="panel">
            <div id="status">Đang tải...</div>
            
            <div class="controls">
                <select id="gameMode">
                    <option value="pvp">Người vs Người</option>
                    <option value="pve">Người vs Máy</option>
                </select>
                <button id="resetBtn">Chơi Ván Mới</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
