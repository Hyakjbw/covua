<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tự Động Việt Hoá JSON Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        button, input[type="file"] { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button { background-color: #3498db; color: white; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #downloadBtn { background-color: #2ecc71; display: none; }
        #downloadBtn:hover { background-color: #27ae60; }
        #status { font-weight: bold; color: #e67e22; }
        .progress-bar { width: 100%; background-color: #ecf0f1; border-radius: 5px; margin-bottom: 20px; overflow: hidden; display: none; }
        .progress-fill { height: 20px; background-color: #3498db; width: 0%; transition: width 0.3s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .value-cell { max-width: 300px; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h1>Công Cụ Việt Hoá File JSON</h1>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".json">
        <button id="translateBtn" disabled>Bắt đầu Dịch Tự Động</button>
        <button id="downloadBtn">Tải File JSON đã dịch</button>
        <span id="status">Vui lòng chọn file JSON...</span>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <table id="jsonTable">
        <thead>
            <tr>
                <th>Key (Mã)</th>
                <th>Tiếng Anh (Gốc)</th>
                <th>Tiếng Việt (Đã dịch)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    let jsonData = {};
    let translatedData = {};
    let totalKeys = 0;
    
    const fileInput = document.getElementById('fileInput');
    const translateBtn = document.getElementById('translateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusText = document.getElementById('status');
    const tableBody = document.querySelector('#jsonTable tbody');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    // Xử lý khi chọn file
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                jsonData = JSON.parse(e.target.result);
                translatedData = JSON.parse(JSON.stringify(jsonData)); // Copy dữ liệu
                totalKeys = Object.keys(jsonData).length;
                
                statusText.innerText = `Đã tải file. Tìm thấy ${totalKeys} dòng.`;
                translateBtn.disabled = false;
                downloadBtn.style.display = 'none';
                renderTable();
            } catch (error) {
                statusText.innerText = 'Lỗi: File JSON không hợp lệ!';
                statusText.style.color = 'red';
            }
        };
        reader.readAsText(file);
    });

    // Hiển thị một số dòng đầu ra bảng để preview
    function renderTable() {
        tableBody.innerHTML = '';
        const keys = Object.keys(jsonData);
        // Chỉ hiển thị 50 dòng đầu để tránh lag trình duyệt
        const previewKeys = keys.slice(0, 50); 
        
        previewKeys.forEach(key => {
            const tr = document.createElement('tr');
            tr.id = `row-${key}`;
            tr.innerHTML = `
                <td>${key}</td>
                <td class="value-cell">${jsonData[key]}</td>
                <td class="value-cell" id="trans-${key}">...</td>
            `;
            tableBody.appendChild(tr);
        });

        if (keys.length > 50) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="3" style="text-align:center;"><i>... và ${keys.length - 50} dòng khác bị ẩn để tránh giật lag.</i></td>`;
            tableBody.appendChild(tr);
        }
    }

    // Hàm gọi API dịch (Dùng API miễn phí MyMemory)
    async function fetchTranslation(text) {
        // Nếu text là rỗng hoặc số, bỏ qua
        if (!text || typeof text !== 'string') return text;
        
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|vi`;
            const response = await fetch(url);
            const data = await response.json();
            return data.responseData.translatedText;
        } catch (error) {
            console.error("Lỗi dịch thuật:", error);
            return text; // Giữ nguyên nếu lỗi
        }
    }

    // Nút Bắt đầu dịch
    translateBtn.addEventListener('click', async function() {
        translateBtn.disabled = true;
        progressBar.style.display = 'block';
        const keys = Object.keys(jsonData);
        let processed = 0;

        for (const key of keys) {
            const originalText = jsonData[key];
            
            // Dịch và cập nhật object
            const transText = await fetchTranslation(originalText);
            translatedData[key] = transText;

            // Cập nhật giao diện nếu dòng đó đang hiển thị
            const transCell = document.getElementById(`trans-${key}`);
            if (transCell) {
                transCell.innerText = transText;
            }

            // Cập nhật tiến trình
            processed++;
            const percent = Math.round((processed / totalKeys) * 100);
            progressFill.style.width = percent + '%';
            statusText.innerText = `Đang dịch: ${processed}/${totalKeys} (${percent}%)`;

            // Trễ 0.5s giữa mỗi lần gọi API để không bị chặn (Rate Limit)
            await new Promise(r => setTimeout(r, 500)); 
        }

        statusText.innerText = "Đã dịch xong! Bạn có thể tải file về.";
        statusText.style.color = "green";
        downloadBtn.style.display = 'inline-block';
    });

    // Nút Tải xuống file
    downloadBtn.addEventListener('click', function() {
        const jsonString = JSON.stringify(translatedData, null, 4);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = "Vietnamese.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
