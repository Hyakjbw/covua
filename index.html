<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cờ Vua</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; text-align: center; }
        /* Đảm bảo responsive trên mọi thiết bị */
        #board {
            width: 100%;
            max-width: 450px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            background-color: white;
        }
        button { background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
        #status {
            font-size: 18px;
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Cờ Vua Online</h1>
    
    <div class="controls">
        <select id="gameMode">
            <option value="pvp">Người vs Người (Chung máy)</option>
            <option value="pve">Người vs Máy</option>
        </select>
        <button id="resetBtn">Chơi Ván Mới</button>
    </div>

    <div id="status">Lượt Trắng</div>
    <div id="board"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
